<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Velha RPC + RMI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
        <section class="card">
            <h1>Jogo da Velha Multiplayer</h1>
            <p class="subtitle">Frontend em Vercel, backend RPC/RMI no Railway.</p>

            <!-- Backend URL fixada no frontend; não expor campo ao usuário -->

            <div class="actions">
                <button id="btnCreate">Criar partida</button>
                <button id="btnJoin">Entrar na partida</button>
            </div>

            <div class="field-group">
                <label for="matchIdInput">ID da partida</label>
                <input id="matchIdInput" type="text" placeholder="Cole aqui o matchId" />
            </div>

            <div class="status">
                <p><strong>Match:</strong> <span id="matchId">-</span></p>
                <p><strong>Player ID:</strong> <span id="playerId">-</span></p>
                <p><strong>Seu símbolo:</strong> <span id="symbol">-</span></p>
                <p><strong>Turno atual:</strong> <span id="turn">-</span></p>
                <p><strong>Status:</strong> <span id="gameStatus">-</span></p>
                <p><strong>Mensagem:</strong> <span id="message">Aguardando ação...</span></p>
            </div>

            <div id="board" class="board"></div>

            <div class="actions">
                <button id="btnRefresh">Atualizar estado</button>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>

</html>
